name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --coverage --passWithNoTests
        env:
          CI: true

      - name: Verify coverage file exists
        run: |
          echo "=== Coverage file check ==="
          ls -la coverage/ || echo "No coverage directory!"
          wc -l coverage/lcov.info || echo "No lcov.info file!"
          echo "=== First 5 lines of lcov.info ==="
          head -5 coverage/lcov.info || echo "Cannot read lcov.info"

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
