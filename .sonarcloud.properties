# SonarCloud configuration for Rekwizytor

# Project identification
sonar.projectKey=kubi-4327_rekwizytor
sonar.organization=kubi-4327

# Exclude test coverage requirement for new code
# This is a portfolio project - code quality metrics are more relevant than test coverage
sonar.coverage.exclusions=**/*

# Alternatively, if you want to exclude only specific patterns:
# sonar.coverage.exclusions=**/*.test.tsx,**/*.test.ts,**/tests/**,**/__tests__/**

# Source encoding
sonar.sourceEncoding=UTF-8

# Exclude generated and third-party code from analysis
sonar.exclusions=node_modules/**,dist/**,build/**,.next/**,out/**,public/**,coverage/**

# Include only source files
sonar.sources=app,components,utils,hooks,types,lib
