# SonarCloud configuration for Rekwizytor

# Project identification
sonar.projectKey=kubi-4327_rekwizytor
sonar.organization=kubi-4327

# Source encoding
sonar.sourceEncoding=UTF-8

# Exclude generated and third-party code from analysis
sonar.exclusions=node_modules/**,dist/**,build/**,.next/**,out/**,public/**,coverage/**,__tests__/**

# Include only source files
sonar.sources=app,components,utils,hooks,types,lib

# Test configuration
sonar.tests=__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info
