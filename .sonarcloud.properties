# SonarCloud configuration for Rekwizytor

# Project identification
sonar.projectKey=kubi-4327_rekwizytor
sonar.organization=kubi-4327

# Source encoding
sonar.sourceEncoding=UTF-8

# Exclude generated and third-party code from analysis
sonar.exclusions=node_modules/**,dist/**,build/**,.next/**,out/**,public/**,coverage/**

# Include only source files (exclude tests from source analysis)
sonar.sources=app,components,utils,hooks,types,lib

# Test configuration
sonar.tests=__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude test files and config from coverage calculation
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/jest.config.js,**/jest.setup.js
